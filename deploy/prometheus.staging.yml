# ACAS v2 - Staging Prometheus Configuration
# More aggressive scraping for staging/testing
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "acas-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 3s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postgres"
    static_configs:
      - targets: ["db:9187"]
    scrape_interval: 10s
