# ACAS v2 - Prometheus Alert Rules

groups:
  - name: acas-api
    interval: 30s
    rules:
      # API Error Rate > 5%
      - alert: HighErrorRate
        expr: |
          rate(acas_errors_total[5m]) / rate(acas_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API error rate > 5%"
          description: "Error rate {{ $value | humanizePercentage }} over last 5 minutes"

      # API Latency > 2s (P99)
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99, rate(acas_request_duration_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API P99 latency > 2s"
          description: "P99 latency is {{ $value }}s over last 5 minutes"

      # Database disconnected
      - alert: DatabaseDown
        expr: acas_database_connected == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Database disconnected"
          description: "PostgreSQL connection is down"

      # Redis disconnected
      - alert: RedisDown
        expr: acas_redis_connected == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis disconnected"
          description: "Redis connection is down"

      # API instance down
      - alert: InstanceDown
        expr: up{job="acas-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ACAS API instance down"
          description: "Instance {{ $labels.instance }} has been down for 1 minute"
