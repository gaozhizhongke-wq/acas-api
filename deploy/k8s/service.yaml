apiVersion: v1
kind: Service
metadata:
  name: acas-api
  namespace: acas-prod
  labels:
    app.kubernetes.io/name: acas-api
    app.kubernetes.io/version: "2.0.0"
  annotations:
    # Prometheus scrape annotation
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: acas-api
---
# Headless service for pod discovery
apiVersion: v1
kind: Service
metadata:
  name: acas-api-headless
  namespace: acas-prod
  labels:
    app.kubernetes.io/name: acas-api
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: acas-api
