apiVersion: apps/v1
kind: Deployment
metadata:
  name: acas-api
  namespace: acas-prod
  labels:
    app.kubernetes.io/name: acas-api
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: acas-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acas-api
        app.kubernetes.io/version: "2.0.0"
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Security
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        runAsGroup: 1000
      serviceAccountName: acas-api
      automountServiceAccountToken: false

      # Graceful shutdown
      terminationGracePeriodSeconds: 60

      # Anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: acas-api
                topologyKey: kubernetes.io/hostname

      # Init container: wait for database
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z $ACAS_DB_HOST $ACAS_DB_PORT; do
                echo "PostgreSQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
              echo "Waiting for Redis..."
              until nc -z $ACAS_REDIS_HOST $ACAS_REDIS_PORT; do
                echo "Redis not ready, retrying in 3s..."
                sleep 3
              done
              echo "Redis is ready!"
          envFrom:
            - configMapRef:
                name: acas-config
            - secretRef:
                name: acas-secrets
          env:
            - name: ACAS_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: acas-secrets
                  key: ACAS_DB_HOST
            - name: ACAS_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: acas-secrets
                  key: ACAS_DB_PORT
            - name: ACAS_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: acas-secrets
                  key: ACAS_REDIS_HOST
            - name: ACAS_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: acas-secrets
                  key: ACAS_REDIS_PORT
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      containers:
        - name: acas-api
          # Run Alembic migrations, then start API (migrations run per-pod, idempotent)
          command: ["sh", "-c", "alembic upgrade head && python run.py"]
          image: ghcr.io/acas-project/acas:v2.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Health checks
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /startup
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # Allow up to 150s for ML model loading

          envFrom:
            - configMapRef:
                name: acas-config
            - secretRef:
                name: acas-secrets

          # Override image-specific env vars from secrets
          env:
            - name: ACAS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: acas-secrets
                  key: ACAS_DB_PASSWORD
            - name: ACAS_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: acas-secrets
                  key: ACAS_REDIS_PASSWORD
            - name: ACAS_JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: acas-secrets
                  key: ACAS_JWT_SECRET_KEY

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          # Security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            # Mount empty dir for temp/gradient files
            - name: tmp
              mountPath: /tmp
            # Mount for potential model cache
            - name: model-cache
              mountPath: /root/.cache
            # Read-only root filesystem requires specific writable paths
            - name: var-tmp
              mountPath: /var/tmp

      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
        - name: model-cache
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: var-tmp
          emptyDir:
            medium: Memory

      # Node scheduling (prefer worker nodes, not master)
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoSchedule"
          tolerationSeconds: 60
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoSchedule"
          tolerationSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acas-api
  namespace: acas-prod
  labels:
    app.kubernetes.io/name: acas-api
