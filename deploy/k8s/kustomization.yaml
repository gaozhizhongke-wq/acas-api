# Kustomize overlay for production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: acas-prod

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml

images:
  - name: acas
    newName: ghcr.io/gaozhizhongke-wq/acas-api
    newTag: v2.0.0

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: acas
