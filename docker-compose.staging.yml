# ACAS v2 - Staging Docker Compose
# Relaxed security for testing, includes test data

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ACAS_ENVIRONMENT=staging
      - ACAS_DEBUG=true
      - ACAS_DB_URL=postgresql+psycopg://acas:staging_password@db:5432/acas_staging
      - ACAS_REDIS_URL=redis://redis:6379/1
      - ACAS_SECRET_KEY=staging-secret-key-change-in-production-min-32-chars
      - ACAS_ENCRYPTION_KEY=${ACAS_ENCRYPTION_KEY:-}
      - ACAS_MON_LOG_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./tests:/app/tests  # Mount tests for easy access
      - ./test_data:/app/test_data  # Test data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acas-network
    security_opt:
      - no-new-privileges:true
    command: python run.py

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=acas
      - POSTGRES_PASSWORD=staging_password
      - POSTGRES_DB=acas_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # Run migrations on startup
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acas"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - acas-network
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --loglevel debug
    volumes:
      - redis_staging_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - acas-network
    security_opt:
      - no-new-privileges:true

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_staging_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - acas-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=staging_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - acas-network
    depends_on:
      - prometheus

  # Test runner (for automated testing)
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ACAS_API_URL=http://api:8000
      - ACAS_TEST_USER_EMAIL=test@acas-staging.com
      - ACAS_TEST_USER_PASSWORD=TestPassword123!
    volumes:
      - ./tests:/app/tests
      - ./test-reports:/app/test-reports
    networks:
      - acas-network
    depends_on:
      - api
    command: pytest tests/ -v --tb=short --junitxml=/app/test-reports/junit.xml
    profiles:
      - testing

networks:
  acas-network:
    driver: bridge

volumes:
  postgres_staging_data:
  redis_staging_data:
  prometheus_staging_data:
  grafana_staging_data:
