name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acas
          POSTGRES_PASSWORD: acas_test
          POSTGRES_DB: acas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pytest pytest-cov pytest-asyncio httpx PyYAML

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U acas > /dev/null 2>&1; then
              echo "PostgreSQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not start"
          exit 1

      - name: Run full test suite
        env:
          ACAS_DB_URL: postgresql+psycopg://acas:acas_test@localhost:5432/acas_test
          ACAS_REDIS_URL: redis://localhost:6379/0
          ACAS_RATE_LIMIT_ENABLED: "true"
          ACAS_ML_SENTIMENT_ENABLED: "false"
          HF_ENDPOINT: https://hf-mirror.com
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          PYTHONPATH=$PWD/src pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml \
            --cov-fail-under=80 \
            -k "not (timesfm or prophet or lstm or sales_predictor or load_test or locustfile or staging)" \
            --timeout=60

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

      - name: Security scan (Bandit)
        run: bandit -r src/ -f screen --severity-level=high --confidence-level=high

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: acas-api:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker run --rm acas-api:test python -c "
            import sys; sys.path.insert(0, 'src')
            from core.config import Settings
            print('Config OK')
          "
