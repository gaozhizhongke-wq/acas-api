name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acas
          POSTGRES_PASSWORD: acas_test
          POSTGRES_DB: acas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pytest pytest-cov pytest-asyncio httpx PyYAML

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U acas > /dev/null 2>&1; then
              echo "PostgreSQL is up"
              break
            fi
            sleep 2
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            if redis-cli -h localhost -p 6379 ping > /dev/null 2>&1; then
              echo "Redis is up"
              break
            fi
            sleep 2
          done

      - name: Run tests
        env:
          ACAS_DB_URL: postgresql+psycopg://acas:acas_test@localhost:5432/acas_test
          ACAS_REDIS_URL: redis://localhost:6379/0
          ACAS_RATE_LIMIT_ENABLED: "true"
          ACAS_ML_SENTIMENT_ENABLED: "false"
          HF_ENDPOINT: https://hf-mirror.com
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          PYTHONPATH=$PWD/src pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml \
            --cov-fail-under=80 \
            -k "not (timesfm or prophet or lstm or sales_predictor or load_test or locustfile or staging)" \
            --timeout=60

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

      - name: Security scan
        run: bandit -r src/ -f screen --severity-level=high --confidence-level=high

      - name: Build Docker image
        run: docker build -t acas-api:ci .

      - name: Verify Docker image
        run: |
          docker run --rm acas-api:ci python -c "
            import sys; sys.path.insert(0, 'src')
            from core.config import Settings
            print('Docker image OK')
          "
