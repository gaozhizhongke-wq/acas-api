name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acas
          POSTGRES_PASSWORD: acas_test
          POSTGRES_DB: acas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes --requirepass acas_test_redis
        options: >-
          --health-cmd "redis-cli -a acas_test_redis ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      # ── Full test suite (Redis ON, ML OFF, coverage gate enforced) ──────
      # Excludes only ML-engine tests (timesfm/prophet/lstm/sales_predictor)
      # that would attempt model downloads. Route-layer sentiment/intelligence
      # tests run in rule-based fallback mode (no model download needed).
      - name: Run full test suite (rate-limit, auth, security ON)
        env:
          ACAS_DB_URL: postgresql+psycopg://acas:acas_test@localhost:5432/acas_test
          ACAS_REDIS_URL: redis://acas_test_redis@localhost:6379/0
          ACAS_RATE_LIMIT_ENABLED: "true"       # P0-4 FIX: test with rate-limit ON
          ACAS_ML_SENTIMENT_ENABLED: "false"
          HF_ENDPOINT: https://hf-mirror.com
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          PYTHONPATH=$PWD/src pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml \
            --cov-fail-under=80 \
            -k "not (timesfm or prophet or lstm or sales_predictor or load_test or locustfile or staging)" \
            --timeout=60

      # ── ML engine tests (informational only, graceful degradation) ─────
      - name: Run ML engine tests (ML disabled, no model download)
        continue-on-error: true
        env:
          ACAS_DB_URL: postgresql+psycopg://acas:acas_test@localhost:5432/acas_test
          ACAS_REDIS_URL: redis://acas_test_redis@localhost:6379/0
          ACAS_RATE_LIMIT_ENABLED: "false"
          ACAS_ML_SENTIMENT_ENABLED: "false"
          HF_ENDPOINT: https://hf-mirror.com
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          PYTHONPATH=$PWD/src pytest tests/ -v --tb=short \
            -k "timesfm or prophet or lstm or sales_predictor" \
            --timeout=60 || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

      # ── Security scan (P0-4 FIX: no `|| true`) ─────────────────────────
      - name: Security scan (Bandit)
        run: bandit -r src/ -f screen --severity-level=high --confidence-level=high

  # ─── Docker Build ────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: acas-api:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker run --rm acas-api:test python -c "
            import sys; sys.path.insert(0, 'src')
            from core.config import Settings
            print('Config OK')
          "
